<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Student List</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        .student-card {
            margin-bottom: 20px;
        }

        .student-photo {
            max-width: 150px;
            max-height: 150px;
            object-fit: cover;
        }
    </style>
</head>
<body>
<div class="container mt-4">
    <h1>Student List</h1>

    <div class="row mb-4">
        <div class="col-md-6">
            <form id="searchForm" class="d-flex">
                <input type="text" id="nameSearch" class="form-control me-2" placeholder="Search by name">
                <button type="submit" class="btn btn-primary">Search</button>
            </form>
        </div>
        <div class="col-md-6 text-end">
            <button class="btn btn-success" data-bs-toggle="modal" data-bs-target="#addStudentModal">Add Student
            </button>
        </div>
    </div>

    <div class="row" id="studentsList">
        <!-- Student cards will be displayed here -->
    </div>
</div>

<!-- Modal for adding/editing student -->
<div class="modal fade" id="addStudentModal" tabindex="-1">
    <div class="modal-dialog">
        <div class="modal-content">
            <div class="modal-header">
                <h5 class="modal-title">Add Student</h5>
                <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
            </div>
            <div class="modal-body">
                <form id="studentForm">
                    <input type="hidden" id="studentId">
                    <div class="mb-3">
                        <label for="studentName" class="form-label">Name</label>
                        <input type="text" class="form-control" id="studentName" required>
                    </div>
                    <div class="mb-3">
                        <label for="birthDate" class="form-label">Birth Date</label>
                        <input type="date" class="form-control" id="birthDate" required>
                    </div>
                    <div class="mb-3">
                        <label for="courseName" class="form-label">Course Name</label>
                        <input type="text" class="form-control" id="courseName">
                    </div>
                    <div class="mb-3">
                        <label for="photoUrl" class="form-label">Photo URL</label>
                        <input type="url" class="form-control" id="photoUrl">
                    </div>
                </form>
            </div>
            <div class="modal-footer">
                <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Close</button>
                <button type="button" class="btn btn-primary" id="saveStudent">Save</button>
            </div>
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
<script>
    document.addEventListener('DOMContentLoaded', function () {
        loadStudents();

        // Search form submission
        document.getElementById('searchForm').addEventListener('submit', function (e) {
            e.preventDefault();
            loadStudents();
        });

        // Save student button
        document.getElementById('saveStudent').addEventListener('click', saveStudent);
    });

    function loadStudents() {
        const nameFilter = document.getElementById('nameSearch').value;
        let url = '/students/';

        if (nameFilter) {
            url += `?name=${encodeURIComponent(nameFilter)}`;
        }

        fetch(url)
                .then(response => response.json())
                .then(students => {
                    const studentsList = document.getElementById('studentsList');
                    studentsList.innerHTML = '';

                    students.forEach(student => {
                        const card = createStudentCard(student);
                        studentsList.appendChild(card);
                    });
                })
                .catch(error => console.error('Error loading students:', error));
    }

    function createStudentCard(student) {
        const col = document.createElement('div');
        col.className = 'col-md-4';

        const defaultImage = 'https://via.placeholder.com/150';

        col.innerHTML = `
                <div class="card student-card">
                    <div class="row g-0">
                        <div class="col-md-4">
                            <img src="${student.photo_url || defaultImage}" class="img-fluid rounded-start student-photo" alt="${student.name}">
                        </div>
                        <div class="col-md-8">
                            <div class="card-body">
                                <h5 class="card-title">${student.name}</h5>
                                <p class="card-text">Age: ${student.age}</p>
                                <p class="card-text">Course: ${student.course_name || 'N/A'}</p>
                                <div class="btn-group">
                                    <button class="btn btn-sm btn-primary edit-btn" data-id="${student.id}">Edit</button>
                                    <button class="btn btn-sm btn-danger delete-btn" data-id="${student.id}">Delete</button>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>
            `;

        // Add event listeners for edit and delete buttons
        col.querySelector('.edit-btn').addEventListener('click', () => editStudent(student.id));
        col.querySelector('.delete-btn').addEventListener('click', () => deleteStudent(student.id));

        return col;
    }

    function saveStudent() {
        const studentId = document.getElementById('studentId').value;
        const studentData = {
            name: document.getElementById('studentName').value,
            birth_date: document.getElementById('birthDate').value,
            course_name: document.getElementById('courseName').value,
            photo_url: document.getElementById('photoUrl').value
        };

        const url = '/students/' + (studentId ? studentId : '');
        const method = studentId ? 'PUT' : 'POST';

        fetch(url, {
            method: method,
            headers: {
                'Content-Type': 'application/json',
            },
            body: JSON.stringify(studentData),
        })
                .then(response => response.json())
                .then(() => {
                    const modal = bootstrap.Modal.getInstance(document.getElementById('addStudentModal'));
                    modal.hide();
                    loadStudents();
                })
                .catch(error => console.error('Error saving student:', error));
    }

    function editStudent(id) {
        fetch(`/students/${id}`)
                .then(response => response.json())
                .then(student => {
                    document.getElementById('studentId').value = student.id;
                    document.getElementById('studentName').value = student.name;
                    document.getElementById('birthDate').value = student.birth_date;
                    document.getElementById('courseName').value = student.course_name || '';
                    document.getElementById('photoUrl').value = student.photo_url || '';

                    const modal = new bootstrap.Modal(document.getElementById('addStudentModal'));
                    modal.show();
                })
                .catch(error => console.error('Error loading student:', error));
    }

    function deleteStudent(id) {
        if (confirm('Are you sure you want to delete this student?')) {
            fetch(`/students/${id}`, {
                method: 'DELETE',
            })
                    .then(() => {
                        loadStudents();
                    })
                    .catch(error => console.error('Error deleting student:', error));
        }
    }
</script>
</body>
</html>
