<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Students List</title>
    <link rel="stylesheet" href="https://maxcdn.bootstrapcdn.com/bootstrap/4.5.2/css/bootstrap.min.css">
    <script src="https://code.jquery.com/jquery-3.5.1.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@4.5.2/dist/js/bootstrap.min.js"></script>

</head>

<body>

<div class="container mt-4">
    <h2>Students List</h2>

    <!-- Add student form -->
    <div class="card mt-4">
        <div class="card-header">Add a New Student</div>
        <div class="card-body">
            <form id="addStudentForm">
                <div class="form-group">
                    <label for="name">Student Name:</label>
                    <input type="text" class="form-control" id="name" placeholder="Student Name" required>
                </div>
                <div class="form-group">
                    <label for="birth_date">Birth Date:</label>
                    <input type="date" class="form-control" id="birth_date" required>
                </div>
                <div class="form-group">
                    <label for="course_name">Course Name:</label>
                    <input type="text" class="form-control" id="course_name" placeholder="Flask Dev" required>
                </div>
                <div class="form-group">
                    <label for="photo_url">Photo URL:</label>
                    <input type="url" class="form-control" id="photo_url" placeholder="https://picsum.photos/seed/name/100" required>
                </div>
                <button type="submit" class="btn btn-primary">Add Student</button>
            </form>
        </div>
    </div>

    <!-- Search form -->
<form method="get" action="/students_ui" class="form-inline mb-3">
    <input type="text" name="search_name" class="form-control mr-2" placeholder="Enter name to search">
    <button type="submit" class="btn btn-outline-primary">Search</button>
</form>

    <!-- List of students in a table -->
    <h4 class="mt-4">List of students:</h4>
    <p>Всього студентів: {{ students|length }}</p>
    <table class="table table-striped">
        <thead>
            <tr>
                <th>Student Id</th>
                <th>Name</th>
                <th>Birth Date</th>
                <th>Course</th>
                <th>Photo</th>
            </tr>
        </thead>
        <tbody id="studentsList">
            {% for student in students %}
            <tr>
                <td>{{ student.id }}</td>
                <td>{{ student.name }}</td>
                <td>{{ student.birth_date }}</td>
                <td>{{ student.course_name }}</td>
                <td><img src="{{ student.photo_url }}" alt="photo" width="50"></td>
            </tr>
            {% endfor %}
        </tbody>
    </table>
</div>

<!-- Edit student modal -->
<div class="modal" tabindex="-1" role="dialog" id="editStudentModal">
  <div class="modal-dialog" role="document">
    <div class="modal-content">
      <div class="modal-header">
        <h5 class="modal-title">Edit Student</h5>
        <button type="button" class="close" data-dismiss="modal" aria-label="Close">
          <span aria-hidden="true">&times;</span>
        </button>
      </div>
      <div class="modal-body">
        <form id="editStudentForm">
            <input type="hidden" id="editStudentId">
            <div class="form-group">
                <label for="editStudentName">Name:</label>
                <input type="text" class="form-control" id="editStudentName" required>
            </div>
            <div class="form-group">
                <label for="editStudentBirthDate">Birth Date:</label>
                <input type="date" class="form-control" id="editStudentBirthDate" required>
            </div>
        </form>
      </div>
      <div class="modal-footer">
        <button type="button" class="btn btn-primary" onclick="submitEditStudent()">Save changes</button>
        <button type="button" class="btn btn-secondary" data-dismiss="modal">Close</button>
      </div>
    </div>
  </div>
</div>

<script>
    // Update student
    function updateStudent(id) {
        // Fetch the current details of the student to pre-populate the form.
        // This assumes you have a backend route to get details of a single student.
        $.getJSON(`/students/${id}`, function(data) {
            $('#editStudentId').val(data.student_id);
            $('#editStudentName').val(data.name);
            $('#editStudentBirthDate').val(data.birth_date);
            $('#editStudentModal').modal('show');
        });
    }

    function submitEditStudent() {
        const updatedStudent = {
            name: $('#editStudentName').val(),
            birth_date: $('#editStudentBirthDate').val()
        };

        const studentId = $('#editStudentId').val();

        $.ajax({
            url: `/students/${studentId}`,
            type: 'PATCH',
            data: JSON.stringify(updatedStudent),
            contentType: 'application/json',
            success: function() {
                $('#editStudentModal').modal('hide');
                location.reload();
            }
        });
    }


    // Add new student
    $('#addStudentForm').on('submit', function(e) {
        e.preventDefault();
        const newStudent = {
            name: $('#name').val(),
            birth_date: $('#birth_date').val(),
            course_name: $('#course_name').val(),
            photo_url: $('#photo_url').val()
        };
        $.ajax({
            url: '/add_student',
            type: 'POST',
            data: JSON.stringify(newStudent),
            contentType: 'application/json',
            success: function() {
                location.reload();
            }
        });
    });

    // Delete student
    function deleteStudent(id) {
        if (confirm('Are you sure you want to delete this student?')) {
            $.ajax({
                url: `/students/${id}`,
                type: 'DELETE',
                success: function() {
                    location.reload();
                }
            });
        }
    }


</script>
</body>
</html>
