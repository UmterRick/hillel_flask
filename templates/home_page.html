<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Students List</title>
    <link rel="stylesheet" href="https://maxcdn.bootstrapcdn.com/bootstrap/4.5.2/css/bootstrap.min.css">
    <script src="https://code.jquery.com/jquery-3.5.1.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@4.5.2/dist/js/bootstrap.min.js"></script>

    <script src="https://cdn.jsdelivr.net/npm/popper.js@1.16.1/dist/umd/popper.min.js"></script>

</head>

<body>

<div class="container mt-4">
    <h2>Students List</h2>


    <div class="row mb-3">
        <div class="col-md-6">
            <div class="input-group">
                <input type="text" id="searchName" class="form-control" placeholder="Search by name...">
                <div class="input-group-append">
                    <button class="btn btn-primary" type="button" onclick="searchStudents()">
                        <i class="fas fa-search"></i> Search
                    </button>
                    <button class="btn btn-secondary" type="button" onclick="clearSearch()">
                        <i class="fas fa-times"></i> Clear
                    </button>
                </div>
            </div>
        </div>
    </div>

    <!-- Add student form -->
    <div class="card mt-4">
        <div class="card-header">Add a New Student</div>
        <div class="card-body">
            <form id="addStudentForm">
                <div class="form-group">
                    <label for="name">Student Name:</label>
                    <input type="text" class="form-control" id="name" placeholder="Student Name" required>
                </div>
                <div class="form-group">
                    <label for="birth_date">Birth Date:</label>
                    <input type="date" class="form-control" id="birth_date" required>
                </div>

                <div class="form-group">
                    <label for="course_name">Course name:</label>
                    <input type="text" class="form-control" id="course_name" required>
                </div>
                <div class="form-group">
                    <label for="photo_url">Photo URL:</label>
                    <input type="url" class="form-control" id="photo_url" required>
                </div>

                <button type="submit" class="btn btn-primary">Add Student</button>
            </form>
        </div>
    </div>


    <!-- List of students in a table -->
    <h4 class="mt-4">Students List</h4>

    <table class="table table-striped">
        <thead>
        <tr>
            <th>Student Id</th>
            <th>Name</th>
            <th>Birth Date</th>

            <th>Age</th>
            <th>Course Name</th>
            <th>Photo URL</th>

            <th>Actions</th>
        </tr>
        </thead>
        <tbody id="studentsList">
        <!-- Rows will be populated by jQuery -->
        </tbody>
    </table>
</div>


<!-- Edit student modal -->
<div class="modal" tabindex="-1" role="dialog" id="editStudentModal">
    <div class="modal-dialog" role="document">
        <div class="modal-content">
            <div class="modal-header">
                <h5 class="modal-title">Edit Student</h5>
                <button type="button" class="close" data-dismiss="modal" aria-label="Close">
                    <span aria-hidden="true">&times;</span>
                </button>
            </div>
            <div class="modal-body">
                <form id="editStudentForm">

                    <input type="hidden" id="editStudentId">


                    <div class="form-group">
                        <label for="editStudentName">Name:</label>
                        <input type="text" class="form-control" id="editStudentName" required>
                    </div>
                    <div class="form-group">
                        <label for="editStudentBirthDate">Birth Date:</label>
                        <input type="date" class="form-control" id="editStudentBirthDate" required>
                    </div>

                    <div class="form-group">
                        <label for="editCourseName">Course:</label>
                        <input type="text" class="form-control" id="editCourseName" required>
                    </div>
                    <div class="form-group">
                        <label for="editPhotoURL">Photo URL:</label>
                        <input type="text" class="form-control" id="editPhotoURL" required>
                    </div>
                    <div class="modal-footer">
                        <button type="submit" class="btn btn-primary">Save changes</button>
                        <button type="button" class="btn btn-secondary" data-dismiss="modal">Close</button>
                    </div>
                </form>
            </div>
        </div>
    </div>
</div>

<script>


        function searchStudents() {
        const searchTerm = $('#searchName').val().trim();
        $.getJSON(`/students?name=${encodeURIComponent(searchTerm)}`)
            .done(function(data) {
                updateStudentsTable(data.students);
            })
            .fail(function(error) {
                console.error('Search failed:', error);
            });
    }

    function clearSearch() {
        $('#searchName').val('');
        fetchStudents();
    }


     function updateStudent(id) {
        // Fetch the current details of the student to pre-populate the form.
        // This assumes you have a backend route to get details of a single student.
        $.getJSON(`/students/${id}`, function(data) {
        $('#editStudentId').val(data.id);
            $('#editStudentName').val(data.name);
            $('#editStudentBirthDate').val(data.birth_date);
            $('#editCourseName').val(data.course_name);
            $('#editPhotoURL').val(data.photo_url);
            $('#editStudentModal').modal('show');
        });
    }

    function updateStudentsTable(students) {
        $('#studentsList').empty();
        students.forEach(student => {
            const photoHtml = student.photo_url
                ? `<img src="${student.photo_url}" alt="Student photo" style="width: 50px; height: 50px; object-fit: cover;">`
                : 'No photo';

            $('#studentsList').append(`
                <tr>
                    <td>${student.student_id}</td>
                    <td>${student.name}</td>

                    <td>${student.birth_date}</td>
                    <td>${student.age}</td>
                    <td>${student.course_name}</td>
                    <td>${photoHtml}</td>
                    <td>
                        <button class="btn btn-warning btn-sm" onclick="updateStudent(${student.student_id})">
                            <i class="fas fa-edit"></i> Edit
                        </button>
                        <button class="btn btn-danger btn-sm" onclick="deleteStudent(${student.student_id})">
                            <i class="fas fa-trash"></i> Delete
                        </button>
                    </td>
                </tr>
            `);
        });
    }

    // Add event listener for Enter key in search input
    $('#searchName').on('keyup', function(e) {
        if (e.key === 'Enter') {
            searchStudents();
        }
    });



    function submitEditStudent() {
        const updatedStudent = {

            name: $('#editStudentName').val(),
            birth_date: $('#editStudentBirthDate').val(),
            course_name: $('#editCourseName').val(),
            photo_url: $('#editPhotoURL').val()
            };

        const studentId = $('#editStudentId').val();

        $.ajax({
            url: `/students/${student_id}`,
            type: 'PATCH',
            data: JSON.stringify(updatedStudent),
            contentType: 'application/json',
            success: function() {
                $('#editStudentModal').modal('hide');
                fetchStudents();
            }
        });
    }


function fetchStudents() {
    $.getJSON('/students', function(data) {
        $('#studentsList').empty();
        data.students.forEach(student => {
            const photoHtml = student.photo_url
                ? `<img src="${student.photo_url}" alt="Student photo" style="width: 50px; height: 50px; object-fit: cover;">`
                : 'No photo';

            $('#studentsList').append(`
                <tr>
                    <td>${student.student_id}</td>
                    <td>${student.name}</td>
                    <td>${student.birth_date}</td>
                    <td>${student.age}</td>
                    <td>${student.course_name}</td>
                    <td>${photoHtml}</td>
                    <td>
                        <button class="btn btn-warning btn-sm" onclick="updateStudent(${student.student_id})">Update</button>
                        <button class="btn btn-danger btn-sm" onclick="deleteStudent(${student.student_id})">Delete</button>
                    </td>
                </tr>
            `);
        });
    });
}


    // Add new student
    $('#addStudentForm').on('submit', function(e) {
        e.preventDefault();
        const newStudent = {
            name: $('#name').val(),
            birth_date: $('#birth_date').val(),
            course_name: $('#course_name').val(),
            photo_url: $('#photo_url').val()
            };
        $.ajax({
            url: '/students',
            type: 'POST',
            data: JSON.stringify(newStudent),
            contentType: 'application/json',
            success: function() {
                fetchStudents();
                $('#addStudentForm')[0].reset();
            }
        });
    });

    // Delete student
    function deleteStudent(id) {
        if (confirm('Are you sure you want to delete this student?')) {
            $.ajax({
                url: `/students/${id}`,
                type: 'DELETE',
                success: function() {
                    fetchStudents();
                }
            });
        }
    }

    // Initial fetch
    fetchStudents();


</script>
</body>
</html>
